<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio de Sergio Romo - Desarrollador  de aplicaciones web"
    />
    <link rel="shortcut icon" href="ASSETS/señorX.jpg" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
    <title>Sergio Romo - Portfolio</title>
  </head>

  <body>
    <header>
      <nav class="nav">
        <a href="index.html" class="btn btn-nav">Inicio</a>
        <a href="#proyectos" class="btn btn-nav">Proyectos</a>
        <a href="#sobremi" class="btn btn-nav">Sobre mi</a>
        <a href="formulario.html" class="btn btn-nav">Contacto</a>
      </nav>
    </header>
    <main>
      <section id="contacto" class="fondo-parallax contacto">
        <h1>Contacto</h1>
        

        <form class="form">
          <label class="campo">
            <span>Nombre:</span>
            <input
              type="text"
              name="nombre"
              placeholder="Tu nombre completo"
              required
            />
          </label>

          <label class="campo">
            <span>Teléfono:</span>
            <input type="tel" name="telefono" placeholder="100 10 01 11" />
          </label>

          <label class="campo">
            <span>Email:</span>
            <input
              type="email"
              name="email"
              placeholder="tu@email.com"
              required
            />
          </label>

          

          <label class="campo">
            <span>Mensaje:</span>
            <textarea
              rows="5"
              name="mensaje"
              placeholder="Escribe tu mensaje"
              required
            ></textarea>
          </label>

          <div class="acciones">
            <button type="submit" class="btn btn-enviar">Enviar</button>
            <button type="reset" class="btn btn-borrar">Borrar</button>
          </div>
        </form>
      </section>
    </main>

    <!--============== FOOTER======================-->
    <footer>
      <div class="social">
        <a href="https://github.com/Genchekitin">
          <img src="ASSETS/github-logo.png" alt="Enlace a github" />
        </a>
      </div>

      <p>Sergio Romo Miguel - 2026</p>
    </footer>
  </body>
</html>
